<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ÖGK Entsendungstool</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script>
// ╔═══════════════════════════════════════════════════════════╗
// ║  KONFIGURATION — Diese 3 Werte anpassen!                 ║
// ╚═══════════════════════════════════════════════════════════╝
const SP_SITE = "https://woodspacegmbh.sharepoint.com/sites/WoodSpaceGmbH";;
const SP_LIST = "Mitarbeiter-Stammdaten";
const FLOW_URL = "https://defaultca924f8d3ba44f30896b9100d471b7.6e.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/b383c9f51be24d2daa93beb880675ad5/triggers/manual/paths/invoke?api-version=1";
const OEGK_EMAIL = "service@oegk.at";
const WEITERLEITUNG = ["Thomas", "Michael"];

// Spalten-Mapping: App-Feld → mögliche interne SP-Namen
// SharePoint kodiert Sonderzeichen: ä=_x00e4_ ö=_x00f6_ ü=_x00fc_ ß=_x00df_ Space=_x0020_
// Die App probiert alle Varianten automatisch durch.
const FELD_MAP = {
  versicherungsnummer: ["Versicherungsnummer"],
  vorname: ["Vorname"],
  nachname: ["Nachname"],
  geschlecht: ["Geschlecht"],
  geburtsdatum: ["Geburtsdatum"],
  geburtsort: ["Geburtsort"],
  staatsangehoerigkeit: ["Staatsangeh_x00f6_rigkeit","Staatsangehoerigkeit"],
  fluechtling: ["Fl_x00fc_chtling","Fluechtling"],
  dienstgebername: ["Dienstgebername"],
  beitragskontonummer: ["Beitragskontonummer"],
  oegkStelle: ["OeGKStelle"],
  agStrasse: ["AG_x0020_Stra_x00df_e","AG_x0020_Strasse","AGStra_x00df_e","AGStrasse"],
  agPlz: ["AG_x0020_PLZ","AGPLZ"],
  agOrt: ["AG_x0020_Ort","AGOrt"],
  agLaendercode: ["AG_x0020_L_x00e4_ndercode","AG_x0020_Laendercode","AGL_x00e4_ndercode"],
  agTelefon: ["AG_x0020_Telefon","AGTelefon"],
  agEmail: ["AG_x0020_Email","AGEmail"],
  wohnsitzStrasse: ["Stra_x00df_e_x0020_und_x0020_Hausnummer","Strasse_x0020_und_x0020_Hausnummer"],
  wohnsitzPlz: ["Postleitzahl"],
  wohnsitzOrt: ["Ort"],
  wohnsitzLaendercode: ["L_x00e4_ndercode","Laendercode"],
  wirtschaftssektor: ["Wirtschaftssektor"],
};
</script>
<style>
:root{--bg:#f4f1ec;--bg-card:#fff;--bg-muted:#eae7e1;--bg-accent:#1a3a2a;--text:#1a1a18;--text-sec:#6b6860;--text-muted:#9b978f;--border:#d8d4cc;--border-lt:#eae7e1;--green:#2d6a4f;--green-bg:#d8f3dc;--green-glow:rgba(45,106,79,.12);--red:#c1121f;--radius:12px;--radius-sm:8px;--radius-lg:16px;--shadow:0 1px 3px rgba(0,0,0,.06);--font:'Outfit',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea,button{font-family:var(--font)}
::selection{background:var(--green-bg);color:var(--green)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes checkDraw{from{stroke-dashoffset:24}to{stroke-dashoffset:0}}
.fade-up{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) forwards}
.scale-in{animation:scaleIn .4s cubic-bezier(.22,1,.36,1) forwards}
.field{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg-card);transition:border-color .2s,box-shadow .2s;outline:none;color:var(--text)}
.field:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

async function loadMitarbeiter(){
  const url=`${SP_SITE}/_api/web/lists/getbytitle('${SP_LIST}')/items?$top=500`;
  const res=await fetch(url,{headers:{"Accept":"application/json;odata=verbose"},credentials:"include"});
  if(!res.ok) throw new Error("SharePoint Fehler: "+res.status);
  const data=await res.json();
  const items=data.d.results;
  const fieldMap={};
  if(items.length>0){
    const keys=Object.keys(items[0]);
    for(const[af,cands]of Object.entries(FELD_MAP)){for(const c of cands){if(keys.includes(c)){fieldMap[af]=c;break}}}
    console.log("Erkannte SP-Feldnamen:",fieldMap);
    console.log("Alle Felder:",keys.filter(k=>!k.startsWith("__")&&!k.startsWith("odata")&&!k.endsWith("StringId")));
  }
  return items.map(item=>{
    const g=f=>{const sf=fieldMap[f];if(!sf)return"";const v=item[sf];if(v==null)return"";if(typeof v==="object"&&v.Label)return v.Label;return String(v)};
    return{id:item.Id,versNr:g("versicherungsnummer"),vorname:g("vorname"),nachname:g("nachname"),
      name:`${g("vorname")} ${g("nachname")}`.trim(),geschlecht:g("geschlecht"),
      geburtsdatum:g("geburtsdatum"),geburtsort:g("geburtsort"),
      staatsangehoerigkeit:g("staatsangehoerigkeit"),fluechtling:g("fluechtling"),
      dienstgebername:g("dienstgebername"),beitragskontonummer:g("beitragskontonummer"),
      oegkStelle:g("oegkStelle"),agStrasse:g("agStrasse"),agPlz:g("agPlz"),agOrt:g("agOrt"),
      agLaendercode:g("agLaendercode"),agTelefon:g("agTelefon"),agEmail:g("agEmail"),
      strasse:g("wohnsitzStrasse"),plz:g("wohnsitzPlz"),ort:g("wohnsitzOrt"),
      laendercode:g("wohnsitzLaendercode"),wirtschaftssektor:g("wirtschaftssektor")};
  });
}

const LAENDER=["Belgien","Bulgarien","D\u00e4nemark","Deutschland","Estland","Finnland","Frankreich","Griechenland","Irland","Island","Italien","Kroatien","Lettland","Liechtenstein","Litauen","Luxemburg","Malta","Niederlande","Norwegen","Polen","Portugal","Rum\u00e4nien","Schweden","Schweiz","Slowakei","Slowenien","Spanien","Tschechien","Ungarn","Vereinigtes K\u00f6nigreich","Zypern"];

const I=({d,s=20})=><svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
const Icons={
  users:()=><I d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>,
  send:()=><I d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/>,
  check:()=><I d="M20 6L9 17l-5-5"/>,
  globe:()=><I d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM2 12h20"/>,
  mail:()=><I d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zM22 6l-10 7L2 6"/>,
  arrow:()=><I d="M5 12h14M12 5l7 7-7 7"/>,
  back:()=><I d="M19 12H5M12 19l-7-7 7-7"/>,
  refresh:()=><I d="M23 4v6h-6M1 20v-6h6"/>,
  search:()=><I d="M11 19a8 8 0 100-16 8 8 0 000 16zM21 21l-4.35-4.35"/>,
  alert:()=><I d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM12 8v4M12 16h.01"/>,
};
const Spinner=({s=20})=><svg width={s} height={s} viewBox="0 0 24 24" style={{animation:"spin 1s linear infinite"}}><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="2.5" strokeDasharray="32" strokeLinecap="round" opacity=".3"/><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" strokeWidth="2.5" strokeDasharray="32" strokeDashoffset="24" strokeLinecap="round"/></svg>;
const Chk=({checked,onChange})=><div onClick={onChange} style={{width:22,height:22,borderRadius:6,cursor:"pointer",border:checked?"none":"2px solid var(--border)",background:checked?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",transition:"all .15s",flexShrink:0}}>{checked&&<Icons.check/>}</div>;
const Btn=({children,disabled,onClick})=><button disabled={disabled} onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:8,padding:"12px 24px",borderRadius:"var(--radius)",border:"none",cursor:disabled?"not-allowed":"pointer",fontSize:14,fontWeight:700,background:disabled?"var(--bg-muted)":"var(--bg-accent)",color:disabled?"var(--text-muted)":"#d8f3dc",boxShadow:disabled?"none":"0 2px 8px rgba(26,58,42,.2)"}}>{children}</button>;
const BtnG=({children,disabled,onClick})=><button disabled={disabled} onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"10px 18px",borderRadius:"var(--radius)",border:"1.5px solid var(--border)",background:"transparent",cursor:disabled?"not-allowed":"pointer",fontSize:14,fontWeight:600,color:"var(--text-sec)",opacity:disabled?.4:1}}>{children}</button>;
const Card=({title,icon,extra,children})=><div style={{background:"var(--bg-card)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",padding:"20px 24px",boxShadow:"var(--shadow)"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{color:"var(--green)"}}>{icon}</span><span style={{fontWeight:700,fontSize:15}}>{title}</span></div>{extra}</div>{children}</div>;
const Field=({label,children})=><div><label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--text-sec)",marginBottom:6}}>{label}</label>{children}</div>;
const Bar=({left,right})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:28,paddingTop:20,borderTop:"1px solid var(--border-lt)"}}>{left}{right}</div>;

function App(){
  const[ma,setMa]=useState([]);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
  const[step,setStep]=useState(0);const[sel,setSel]=useState([]);const[search,setSearch]=useState("");
  const[cfg,setCfg]=useState({land:"Deutschland",beginn:"",ende:"",stelle:"",feste:false,str:"",plz:"",ort:"",email:false});
  const[processing,setProcessing]=useState(false);const[pSteps,setPSteps]=useState([]);const[result,setResult]=useState(null);

  useEffect(()=>{loadMitarbeiter().then(i=>{setMa(i);setLoading(false)}).catch(e=>{setError(e.message);setLoading(false)})},[]);

  const toggle=id=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const filtered=ma.filter(m=>!search||m.name.toLowerCase().includes(search.toLowerCase())||m.versNr.includes(search));
  const selectAll=()=>sel.length===filtered.length?setSel([]):setSel(filtered.map(m=>m.id));
  const fmtDate=d=>{if(!d)return"\u2014";try{return new Date(d).toLocaleDateString("de-AT",{day:"2-digit",month:"short",year:"numeric"})}catch{return d}};
  const fmtDE=d=>{if(!d)return"";const[y,m,dd]=d.split("-");return`${dd}.${m}.${y}`};

  const submit=async()=>{
    setProcessing(true);setPSteps([{l:"PDFs werden bef\u00fcllt...",s:"active"}]);
    await new Promise(r=>setTimeout(r,800));
    setPSteps(p=>[{...p[0],s:"done"},{l:cfg.email?"E-Mails werden gesendet...":"PDFs werden erstellt...",s:"active"}]);
    const maData=sel.map(id=>{const m=ma.find(x=>x.id===id);return m?{
      versicherungsnummer:m.versNr,vorname:m.vorname,nachname:m.nachname,geschlecht:m.geschlecht,
      geburtsdatum:m.geburtsdatum,geburtsort:m.geburtsort,staatsangehoerigkeit:m.staatsangehoerigkeit,
      fluechtling:m.fluechtling,dienstgebername:m.dienstgebername,beitragskontonummer:m.beitragskontonummer,
      oegkStelle:m.oegkStelle,wirtschaftssektor:m.wirtschaftssektor,
      agStrasse:m.agStrasse,agPlz:m.agPlz,agOrt:m.agOrt,agLaendercode:m.agLaendercode,
      agTelefon:m.agTelefon,agEmail:m.agEmail,
      strasse:m.strasse,plz:m.plz,ort:m.ort,laendercode:m.laendercode
    }:null}).filter(Boolean);
    try{
      const res=await fetch(FLOW_URL,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({mitarbeiter:maData,land:cfg.land,beginn:fmtDE(cfg.beginn),ende:fmtDE(cfg.ende),
          beschaeftigungsstelle:cfg.stelle,feste_adresse:cfg.feste,strasse:cfg.str,plz:cfg.plz,ort:cfg.ort,email_senden:cfg.email})});
      await res.json();await new Promise(r=>setTimeout(r,600));
      setPSteps(p=>[p[0],{...p[1],s:"done"},{l:"Fertig!",s:"done"}]);
      await new Promise(r=>setTimeout(r,500));setResult({ok:true,count:maData.length});
    }catch(err){setPSteps(p=>[...p.slice(0,-1),{l:"Fehler: "+err.message,s:"error"}])}
    setProcessing(false);
  };

  const reset=()=>{setStep(0);setSel([]);setResult(null);setPSteps([]);setCfg({land:"Deutschland",beginn:"",ende:"",stelle:"",feste:false,str:"",plz:"",ort:"",email:false})};
  const ok1=sel.length>0,ok2=cfg.beginn&&cfg.ende&&cfg.land;

  if(loading)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}><Spinner s={32}/><span style={{color:"var(--text-sec)",fontSize:14}}>Mitarbeiter werden aus SharePoint geladen...</span></div>;
  if(error)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:20,padding:32}}>
    <div style={{color:"var(--red)"}}><Icons.alert/></div>
    <p style={{textAlign:"center",maxWidth:500,color:"var(--text-sec)",lineHeight:1.6}}>{error}</p>
    <div style={{background:"var(--bg-muted)",borderRadius:"var(--radius)",padding:20,maxWidth:500,width:"100%",fontSize:13}}>
      <div style={{fontWeight:700,marginBottom:8}}>Checkliste:</div>
      <div style={{color:"var(--text-sec)",lineHeight:1.8}}>
        1. SP_SITE korrekt? Aktuell: <code style={{fontFamily:"var(--mono)",color:"var(--green)"}}>{SP_SITE}</code><br/>
        2. Listenname korrekt? Aktuell: <code style={{fontFamily:"var(--mono)",color:"var(--green)"}}>{SP_LIST}</code><br/>
        3. Bist du auf der SharePoint-Seite angemeldet?
      </div>
    </div>
  </div>;

  return<div style={{minHeight:"100vh"}}>
    <header style={{background:"var(--bg-card)",borderBottom:"1px solid var(--border)",padding:"0 32px",height:64,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50,backgroundColor:"rgba(255,255,255,.95)"}}>
      <div style={{display:"flex",alignItems:"center",gap:14}}>
        <div style={{width:38,height:38,borderRadius:10,background:"var(--bg-accent)",color:"#d8f3dc",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--mono)",fontWeight:700,fontSize:14}}>E1</div>
        <div><div style={{fontWeight:700,fontSize:16,letterSpacing:-.4}}>Entsendungstool</div><div style={{fontSize:11,color:"var(--text-muted)",fontWeight:500,letterSpacing:.3,textTransform:"uppercase"}}>{"\u00D6"}sterreichische Gesundheitskasse</div></div>
      </div>
      <div style={{fontSize:12,color:"var(--text-muted)",fontFamily:"var(--mono)"}}>{ma.length} Mitarbeiter geladen</div>
    </header>
    <main style={{maxWidth:960,margin:"0 auto",padding:"28px 24px 80px"}}>
    {!result&&<div className="fade-up">
      <div style={{display:"flex",alignItems:"center",gap:0,marginBottom:32,padding:"0 8px"}}>
        {["Mitarbeiter","Entsendung","Senden"].map((l,i)=><React.Fragment key={i}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:i<step?"pointer":"default"}} onClick={()=>{if(i<step)setStep(i)}}>
            <div style={{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,background:step>i?"var(--green)":step===i?"var(--bg-accent)":"var(--bg-muted)",color:step>=i?"#fff":"var(--text-muted)",boxShadow:step===i?"0 0 0 4px var(--green-glow)":"none"}}>{step>i?<Icons.check/>:i+1}</div>
            <span style={{fontSize:13,fontWeight:step===i?700:500,color:step>=i?"var(--text)":"var(--text-muted)"}}>{l}</span>
          </div>{i<2&&<div style={{flex:1,height:2,margin:"0 16px",background:step>i?"var(--green)":"var(--border-lt)"}}/>}
        </React.Fragment>)}
      </div>

      {step===0&&<div className="fade-up">
        <div style={{marginBottom:20}}><h2 style={{fontSize:24,fontWeight:800,letterSpacing:-.5,marginBottom:4}}>Wer f{"\u00E4"}hrt?</h2><p style={{color:"var(--text-sec)",fontSize:14}}>Mitarbeiter f{"\u00FC"}r die Entsendung ausw{"\u00E4"}hlen</p></div>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:10,background:"var(--bg-card)",border:"1.5px solid var(--border)",borderRadius:"var(--radius)",padding:"0 14px"}}><span style={{color:"var(--text-muted)"}}><Icons.search/></span><input placeholder="Name oder Vers.-Nr. suchen..." value={search} onChange={e=>setSearch(e.target.value)} style={{border:"none",outline:"none",width:"100%",padding:"11px 0",fontSize:14,background:"transparent"}}/></div>
          <button onClick={selectAll} style={{padding:"0 18px",borderRadius:"var(--radius)",border:"1.5px solid var(--border)",background:"var(--bg-card)",fontSize:13,fontWeight:600,cursor:"pointer",color:"var(--text-sec)",whiteSpace:"nowrap"}}>{sel.length===filtered.length?"Keine":"Alle"} ausw{"\u00E4"}hlen</button>
        </div>
        <div style={{background:"var(--bg-card)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",overflow:"hidden",boxShadow:"var(--shadow)"}}>
          <div style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 160px",padding:"14px 20px",background:"var(--bg)",borderBottom:"1px solid var(--border)",fontSize:11,fontWeight:700,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:.8}}><div/><div>Name</div><div>Vers.-Nr.</div><div>Wohnort</div></div>
          {filtered.map((m,i)=>{const s=sel.includes(m.id);return<div key={m.id} onClick={()=>toggle(m.id)} style={{display:"grid",gridTemplateColumns:"40px 1fr 1fr 160px",padding:"14px 20px",alignItems:"center",cursor:"pointer",borderBottom:i<filtered.length-1?"1px solid var(--border-lt)":"none",background:s?"var(--green-glow)":"transparent",borderLeft:s?"3px solid var(--green)":"3px solid transparent"}}>
            <div style={{width:22,height:22,borderRadius:6,border:s?"none":"2px solid var(--border)",background:s?"var(--green)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>{s&&<Icons.check/>}</div>
            <div><div style={{fontWeight:600,fontSize:15}}>{m.name}</div><div style={{fontSize:12,color:"var(--text-muted)",marginTop:1}}>{m.dienstgebername}</div></div>
            <div style={{fontFamily:"var(--mono)",fontSize:13,color:"var(--text-sec)"}}>{m.versNr}</div>
            <div style={{fontSize:13,color:"var(--text-sec)"}}>{m.plz} {m.ort}</div>
          </div>})}
          {filtered.length===0&&<div style={{padding:40,textAlign:"center",color:"var(--text-muted)"}}>Keine Mitarbeiter gefunden</div>}
        </div>
        <Bar left={<span style={{fontSize:13,color:"var(--text-muted)",fontWeight:500}}>{sel.length} ausgew{"\u00E4"}hlt</span>} right={<Btn disabled={!ok1} onClick={()=>setStep(1)}>Weiter <Icons.arrow/></Btn>}/>
      </div>}

      {step===1&&<div className="fade-up">
        <div style={{marginBottom:20}}><h2 style={{fontSize:24,fontWeight:800,letterSpacing:-.5,marginBottom:4}}>Wohin & wann?</h2><p style={{color:"var(--text-sec)",fontSize:14}}>Besch{"\u00E4"}ftigungsstaat, Zeitraum und Einsatzort</p></div>
        <div style={{display:"grid",gap:16}}>
          <Card title="Ziel & Zeitraum" icon={<Icons.globe/>}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
              <Field label="Besch\u00E4ftigungsstaat"><select className="field" value={cfg.land} onChange={e=>setCfg(p=>({...p,land:e.target.value}))}>{LAENDER.map(l=><option key={l}>{l}</option>)}</select></Field>
              <Field label="Beginn"><input type="date" className="field" value={cfg.beginn} onChange={e=>setCfg(p=>({...p,beginn:e.target.value}))}/></Field>
              <Field label="Voraussichtliches Ende"><input type="date" className="field" value={cfg.ende} onChange={e=>setCfg(p=>({...p,ende:e.target.value}))}/></Field>
            </div>
          </Card>
          <Card title="Einsatzort" icon={<Icons.globe/>} extra={<label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,fontWeight:600,color:"var(--text-sec)"}}><Chk checked={cfg.feste} onChange={()=>setCfg(p=>({...p,feste:!p.feste}))}/> Feste Adresse</label>}>
            <Field label="Besch\u00E4ftigungsstelle"><input className="field" placeholder="z.B. Baustelle M\u00FCnchen Ost" value={cfg.stelle} onChange={e=>setCfg(p=>({...p,stelle:e.target.value}))}/></Field>
            {cfg.feste&&<div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:14,marginTop:14}}>
              <Field label="Stra\u00DFe"><input className="field" value={cfg.str} onChange={e=>setCfg(p=>({...p,str:e.target.value}))}/></Field>
              <Field label="PLZ"><input className="field" value={cfg.plz} onChange={e=>setCfg(p=>({...p,plz:e.target.value}))}/></Field>
              <Field label="Ort"><input className="field" value={cfg.ort} onChange={e=>setCfg(p=>({...p,ort:e.target.value}))}/></Field>
            </div>}
          </Card>
          <Card title="E-Mail-Versand" icon={<Icons.mail/>}>
            <label style={{display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer"}}>
              <div style={{paddingTop:2}}><Chk checked={cfg.email} onChange={()=>setCfg(p=>({...p,email:!p.email}))}/></div>
              <div><div style={{fontWeight:600,fontSize:14}}>PDF direkt per E-Mail an {"\u00D6"}GK senden</div><div style={{fontSize:13,color:"var(--text-muted)",marginTop:3,lineHeight:1.5}}>Sendet die PDFs an {OEGK_EMAIL} und informiert {WEITERLEITUNG.join(" & ")} automatisch.</div></div>
            </label>
          </Card>
        </div>
        <Bar left={<BtnG onClick={()=>setStep(0)}><Icons.back/> Zur{"\u00FC"}ck</BtnG>} right={<Btn disabled={!ok2} onClick={()=>setStep(2)}>Weiter <Icons.arrow/></Btn>}/>
      </div>}

      {step===2&&<div className="fade-up">
        <div style={{marginBottom:20}}><h2 style={{fontSize:24,fontWeight:800,letterSpacing:-.5,marginBottom:4}}>Zusammenfassung</h2><p style={{color:"var(--text-sec)",fontSize:14}}>Pr{"\u00FC"}fen und absenden</p></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
          <div style={{background:"var(--bg-card)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",padding:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><span style={{color:"var(--green)"}}><Icons.users/></span><span style={{fontWeight:700,fontSize:15}}>{sel.length} Mitarbeiter</span></div>
            {sel.map(id=>{const m=ma.find(x=>x.id===id);return m&&<div key={id} style={{padding:"10px 14px",background:"var(--bg)",borderRadius:"var(--radius-sm)",marginBottom:6}}><div style={{fontWeight:600,fontSize:14}}>{m.name}</div><div style={{fontFamily:"var(--mono)",fontSize:12,color:"var(--text-muted)"}}>{m.versNr} {"\u2014"} {m.dienstgebername}</div></div>})}
          </div>
          <div style={{background:"var(--bg-card)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",padding:20}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}><span style={{color:"var(--green)"}}><Icons.globe/></span><span style={{fontWeight:700,fontSize:15}}>Entsendung</span></div>
            {[["Zielland",cfg.land],["Beginn",fmtDate(cfg.beginn)],["Ende",fmtDate(cfg.ende)],["Stelle",cfg.stelle||"\u2014"],["E-Mail",cfg.email?"Ja, an \u00D6GK":"Nur PDF"]].map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid var(--border-lt)",fontSize:14}}><span style={{color:"var(--text-sec)"}}>{k}</span><span style={{fontWeight:600}}>{v}</span></div>)}
          </div>
        </div>
        {pSteps.length>0&&<div style={{background:"var(--bg-card)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",padding:20,marginBottom:16}}>
          {pSteps.map((ps,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<pSteps.length-1?"1px solid var(--border-lt)":"none"}}>
            {ps.s==="done"&&<span style={{color:"var(--green)"}}><Icons.check/></span>}
            {ps.s==="active"&&<Spinner s={18}/>}
            {ps.s==="error"&&<span style={{color:"var(--red)"}}><Icons.alert/></span>}
            <span style={{fontWeight:600,fontSize:14,color:ps.s==="done"?"var(--green)":ps.s==="error"?"var(--red)":"var(--text)"}}>{ps.l}</span>
          </div>)}
        </div>}
        <Bar left={<BtnG disabled={processing} onClick={()=>setStep(1)}><Icons.back/> Zur{"\u00FC"}ck</BtnG>} right={<Btn disabled={processing} onClick={submit}>{processing?<><Spinner s={18}/> Verarbeitung...</>:<>{cfg.email?"PDF bef\u00FCllen & senden":"PDF bef\u00FCllen"} <Icons.send/></>}</Btn>}/>
      </div>}
    </div>}

    {result&&<div className="scale-in" style={{textAlign:"center",paddingTop:48}}>
      <div style={{width:72,height:72,borderRadius:"50%",margin:"0 auto 20px",background:"var(--green)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" style={{strokeDasharray:24,animation:"checkDraw .5s ease .2s forwards",strokeDashoffset:24}}/></svg>
      </div>
      <h2 style={{fontSize:26,fontWeight:800,letterSpacing:-.5,marginBottom:6}}>{result.count} PDF{result.count>1?"s":""} erstellt!</h2>
      <p style={{color:"var(--text-sec)",maxWidth:440,margin:"0 auto 28px",lineHeight:1.6}}>
        {cfg.email?`Die Formulare wurden an die \u00D6GK gesendet. ${WEITERLEITUNG.join(" & ")} wurden informiert.`:"Die Formulare wurden erstellt."}
      </p>
      <div style={{background:"var(--bg-card)",borderRadius:"var(--radius-lg)",border:"1px solid var(--border)",maxWidth:520,margin:"0 auto 28px",textAlign:"left",overflow:"hidden"}}>
        {sel.map((id,i)=>{const m=ma.find(x=>x.id===id);return m&&<div key={id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:i<sel.length-1?"1px solid var(--border-lt)":"none"}}>
          <div><div style={{fontWeight:600,fontSize:14}}>{m.name}</div><div style={{fontSize:12,color:"var(--text-muted)"}}>{"\u2192"} {cfg.land}</div></div>
          <span style={{fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:20,background:"var(--green-bg)",color:"var(--green)"}}>Erstellt</span>
        </div>})}
      </div>
      <Btn onClick={reset}><Icons.refresh/> Neue Entsendung</Btn>
    </div>}
    </main>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
